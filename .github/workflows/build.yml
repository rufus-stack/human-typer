name: Build Human Typer

# Builds the distributable apps in the cloud:
#   - Windows  -> HumanTyper-Windows.zip            (the .exe + its files)
#   - macOS    -> HumanTyper-macOS-AppleSilicon.zip (M-series Macs)
#   - macOS    -> HumanTyper-macOS-Intel.zip        (older Intel Macs, best-effort)
#
# Design: Windows + Apple Silicon build fast and reliably, so they gate the
# release. Intel macOS runners queue slowly, so the Intel build runs as its OWN
# job that NEVER blocks the release — it just attaches its zip whenever it finishes.
#
# Trigger it two ways:
#   1. Manually: GitHub -> Actions -> "Build Human Typer" -> Run workflow.
#   2. By tag:   push a version tag (e.g. v1.0.0) -> also publishes a GitHub Release.

on:
  workflow_dispatch:        # the manual "Run workflow" button
  push:
    tags: [ 'v*' ]          # e.g. v1.0.0 -> also makes a Release

permissions:
  contents: write           # lets the jobs create/update Releases

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30        # fail fast instead of hanging if a runner is scarce
    strategy:
      fail-fast: false         # a macOS hiccup must not block the Windows build
      matrix:
        include:
          - os: windows-latest
            label: Windows
            artifact: HumanTyper-Windows
            zipname: HumanTyper-Windows.zip
          - os: macos-latest
            label: macOS (Apple Silicon)
            artifact: HumanTyper-macOS-AppleSilicon
            zipname: HumanTyper-macOS-AppleSilicon.zip

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'   # change to '3.11' if any dep lacks 3.12 wheels
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -r requirements.txt pyinstaller

      - name: Build the app
        run: python -m PyInstaller --noconfirm --clean HumanTyper.spec

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/HumanTyper -DestinationPath "${{ matrix.zipname }}" -Force

      - name: Package (macOS)
        if: runner.os == 'macOS'
        # ditto preserves the .app bundle's symlinks/permissions; plain zip can break it.
        run: ditto -c -k --sequesterRsrc --keepParent "dist/Human Typer.app" "${{ matrix.zipname }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}    # space-free name (folder paths must not break)
          path: ${{ matrix.zipname }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    # always() so a single flaky build leg can't block publishing the ones that succeeded.
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update the Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          tag="${GITHUB_REF_NAME}"
          # Collect into an array so paths with spaces (e.g. folder names) stay intact.
          mapfile -t files < <(find artifacts -type f)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No build artifacts were produced — nothing to publish."; exit 1
          fi
          printf 'Publishing: %s\n' "${files[@]}"
          gh release create "$tag" --title "Human Typer $tag" --generate-notes "${files[@]}" \
            || gh release upload "$tag" "${files[@]}" --clobber

  build-intel:
    name: macOS (Intel) — best effort
    runs-on: macos-13
    # Independent of build/release. Intel runners queue slowly, so this NEVER blocks
    # the main release — it attaches its zip to the release whenever it finishes.
    timeout-minutes: 45
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -r requirements.txt pyinstaller

      - name: Build the app
        run: python -m PyInstaller --noconfirm --clean HumanTyper.spec

      - name: Package
        run: ditto -c -k --sequesterRsrc --keepParent "dist/Human Typer.app" "HumanTyper-macOS-Intel.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HumanTyper-macOS-Intel
          path: HumanTyper-macOS-Intel.zip
          if-no-files-found: error

      - name: Attach to the release when it exists (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          # The main release is published by the `release` job; wait up to ~5 min for it.
          for i in $(seq 1 30); do
            if gh release view "$tag" >/dev/null 2>&1; then break; fi
            echo "waiting for release $tag to exist..."; sleep 10
          done
          gh release upload "$tag" HumanTyper-macOS-Intel.zip --clobber \
            || gh release create "$tag" --title "Human Typer $tag" --generate-notes HumanTyper-macOS-Intel.zip
